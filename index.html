<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGT-Tech Hub</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h1>SGT-Tech Hub</h1>
        <h1>*** live site coming soon ***</h1>
        <p>The Unofficial Platform of SaturnGoldTycoon</p>
        
        <!-- Stream Link Button -->
        <button id="action-btn" onclick="window.open('https://twitch.tv/saturngoldtycoon', '_blank')">Visit Twitch Stream</button>
        <p id="message"></p>

        <!-- Divider Line -->
        <hr class="divider">
        
        <!-- Calculator Section -->
        <h2>⚙️ OS Recovery Estimator</h2>
        
        <div class="form-group">
            <label for="os">Target Operating System</label>
            <select id="os">
                <option value="125">Windows 10 / 11 ($125 Base)</option>
                <option value="160">macOS Apple ($160 Base)</option>
                <option value="195">Linux / Server OS ($195 Base)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="issue">Required Recovery Severity</label>
            <select id="issue">
                <option value="0">Simple Boot Loop Repair (+$0)</option>
                <option value="50">Corrupted Registry / File Rebuild (+$50)</option>
                <option value="100">Full Reinstall + Critical Data Backup (+$100)</option>
            </select>
        </div>

        <div class="price-box">
            <div class="price-title">Total Estimated Cost</div>
            <h3 id="total-price">$125</h3>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
